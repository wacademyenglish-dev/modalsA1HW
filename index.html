<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | Async Mission (Homework)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,800;1,900&display=swap');
        
        body {
            font-family: 'Urbanist', sans-serif;
            background-color: #050505; /* Absolute Black */
            color: #ffffff;
            overflow-x: hidden;
        }

        .matrix-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        .title-massive {
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .glass-panel {
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }
        
        .glass-card {
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.8), rgba(10, 10, 10, 0.9));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-container {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            height: 100%;
            overflow-y: auto;
            padding-bottom: 8rem;
            padding-top: 1rem;
        }
        .step-container.active {
            display: block;
            opacity: 1;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.2); border-radius: 10px; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
            border-color: #ef4444 !important;
            color: #ef4444 !important;
        }
        .correct {
            border-color: #10b981 !important;
            background-color: rgba(16, 185, 129, 0.2) !important;
            color: #10b981 !important;
        }

        .nav-btn {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
            transition: all 0.3s ease;
        }

        /* Card Animation for Sequential Questions */
        .card-enter {
            animation: cardSlideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .feedback-overlay {
            background: rgba(16, 185, 129, 0.95);
            color: black;
            font-weight: 900;
        }

        /* Result Ring */
        .result-ring {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid rgba(16, 185, 129, 0.1);
            border-top-color: #10b981;
            margin: 0 auto;
        }
    </style>
</head>
<body class="flex flex-col h-screen relative">
    
    <div class="matrix-bg"></div>

    <header class="glass-panel h-16 md:h-20 flex items-center justify-between px-4 md:px-8 z-30 sticky top-0">
        <div class="flex items-center gap-3 md:gap-6">
            <div class="w-8 h-8 md:w-10 md:h-10 bg-emerald-500 rounded-full flex items-center justify-center text-black font-black italic">
                W
            </div>
            <div class="title-massive text-xl md:text-2xl text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-emerald-600">
                WOLF LABS
            </div>
        </div>
        
        <div class="flex items-center">
            <div class="text-emerald-500 font-bold uppercase tracking-widest text-xs md:text-sm bg-emerald-500/10 px-3 py-1.5 md:px-4 md:py-2 rounded-full border border-emerald-500/20">
                TASK <span id="step-counter">1</span> / 7
            </div>
        </div>
    </header>

    <main class="flex-1 relative w-full flex justify-center overflow-hidden">
        <div id="steps-wrapper" class="w-full max-w-4xl px-4 md:px-6 pt-6 md:pt-10 h-full overflow-y-auto relative">
            <!-- STEPS INJECTED BY JS -->
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full h-1.5 md:h-2 bg-gray-900 z-50">
        <div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-500 w-0 shadow-[0_0_20px_rgba(16,185,129,0.8)]"></div>
    </div>

    <script>
        // Score tracking logic
        let score = 0;
        let answeredQuestions = new Set();
        const totalPossibleQuestions = 15;
        let labFinished = false;

        // System Data: Revision + Practice Screens
        const homeworkSteps = [
            { id: 1, title: "Briefing", content: `
                <div class="flex flex-col items-center justify-center text-center h-full min-h-[50vh] mt-4">
                    <i class="fa-solid fa-user-ninja text-6xl text-emerald-500 mb-6 drop-shadow-[0_0_15px_rgba(16,185,129,0.4)]"></i>
                    <h1 class="title-massive text-4xl md:text-6xl text-white mb-4 leading-none">ASYNC<br><span class="text-emerald-500">TRAINING</span></h1>
                    <p class="text-gray-400 text-lg mb-8 max-w-lg">Time to master your Modals. Complete the revision and the 15-point challenge.</p>
                    <div class="glass-card p-6 rounded-2xl w-full max-w-md border-l-4 border-emerald-500 text-left">
                        <p class="text-xs uppercase tracking-widest text-emerald-500 font-black mb-2">Protocol</p>
                        <ul class="text-gray-300 text-sm space-y-2">
                            <li>• Quick Grammar Revision</li>
                            <li>• Reading & Context Analysis</li>
                            <li>• 10-Card Sequential Lab</li>
                            <li>• Final Structure Check</li>
                        </ul>
                    </div>
                </div>
            `},
            { id: 2, title: "Grammar Review", content: `
                <h2 class="title-massive text-3xl text-emerald-500 mb-8 text-center">Quick Review</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="glass-card p-6 rounded-2xl border-t-2 border-emerald-500">
                        <h3 class="font-black italic text-emerald-500 mb-2">CAN</h3>
                        <p class="text-xs text-gray-400 uppercase mb-4 tracking-tighter">Ability / Option</p>
                        <p class="text-sm italic">"I <span class="text-emerald-400">can</span> swim."</p>
                        <p class="text-[10px] text-gray-500 mt-2">No 'TO' after CAN.</p>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-t-2 border-blue-500">
                        <h3 class="font-black italic text-blue-500 mb-2">SHOULD</h3>
                        <p class="text-xs text-gray-400 uppercase mb-4 tracking-tighter">Advice / Idea</p>
                        <p class="text-sm italic">"You <span class="text-blue-400">should</span> rest."</p>
                        <p class="text-[10px] text-gray-500 mt-2">Good idea to do.</p>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-t-2 border-purple-500">
                        <h3 class="font-black italic text-purple-500 mb-2">WOULD LIKE</h3>
                        <p class="text-xs text-gray-400 uppercase mb-4 tracking-tighter">Polite Desire</p>
                        <p class="text-sm italic">"I <span class="text-purple-400">would like to</span> go."</p>
                        <p class="text-[10px] text-gray-500 mt-2">Use 'TO' before verb.</p>
                    </div>
                </div>
                <div class="bg-emerald-900/10 border border-emerald-500/20 p-6 rounded-2xl">
                    <p class="text-white text-sm leading-relaxed">
                        <i class="fa-solid fa-lightbulb text-emerald-500 mr-2"></i> 
                        Remember: <strong>Can</strong> and <strong>Should</strong> are direct modals. You jump from them to the action. <strong>Would like</strong> needs the bridge "TO" if you use an action.
                    </p>
                </div>
            `},
            { id: 3, title: "Ready?", content: `
                <div class="flex flex-col items-center justify-center text-center h-full min-h-[50vh] mt-4">
                    <h1 class="title-massive text-7xl md:text-9xl text-white mb-2 animate-pulse">READY?</h1>
                    <p class="text-emerald-500 font-black tracking-[1em] uppercase text-sm mb-12">Let's practice</p>
                    <i class="fa-solid fa-chevron-down text-gray-700 animate-bounce text-3xl"></i>
                </div>
            `},
            { id: 4, title: "Reading Lounge", content: `
                <h2 class="title-massive text-3xl text-emerald-500 mb-8 text-center">Reading Lounge</h2>
                <div class="glass-card border border-gray-800 rounded-3xl p-4 md:p-8 max-w-md mx-auto shadow-2xl mb-12">
                    <div class="flex flex-col gap-4">
                        <div class="flex gap-2">
                            <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-xs font-bold shrink-0">A</div>
                            <div class="bg-gray-800 p-3 rounded-2xl rounded-tl-none text-sm text-gray-100">
                                I'm so tired. I have a headache and I <span class="text-emerald-400 font-bold">can't</span> work today. 🤕
                            </div>
                        </div>
                        <div class="flex gap-2 flex-row-reverse">
                            <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-xs font-bold shrink-0 text-black">B</div>
                            <div class="bg-emerald-600/90 p-3 rounded-2xl rounded-tr-none text-sm text-white">
                                Oh no! You <span class="text-white font-bold underline">should</span> stay home. You <span class="text-white font-bold underline">shouldn't</span> come to the office.
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-xs font-bold shrink-0">A</div>
                            <div class="bg-gray-800 p-3 rounded-2xl rounded-tl-none text-sm text-gray-100">
                                Thanks. I <span class="text-emerald-400 font-bold">would like to</span> sleep all day!
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-4">
                    <div id="static-q-1" class="glass-card p-6 rounded-2xl border-l-4 border-emerald-500 relative overflow-hidden">
                        <p class="text-white font-bold mb-4">Exercise 1: Why can't person A work?</p>
                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="checkAnswer(this, true, 'static-q-1')" class="w-full py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl text-left px-4 hover:border-emerald-500 transition">Because they have a headache.</button>
                            <button onclick="checkAnswer(this, false, 'static-q-1')" class="w-full py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl text-left px-4 hover:border-emerald-500 transition">Because they want to party.</button>
                        </div>
                    </div>
                    <div id="static-q-2" class="glass-card p-6 rounded-2xl border-l-4 border-blue-500 relative overflow-hidden">
                        <p class="text-white font-bold mb-4">Exercise 2: What is person B's advice?</p>
                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="checkAnswer(this, false, 'static-q-2')" class="w-full py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl text-left px-4 hover:border-emerald-500 transition">Person A should go to the gym.</button>
                            <button onclick="checkAnswer(this, true, 'static-q-2')" class="w-full py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl text-left px-4 hover:border-emerald-500 transition">Person A should stay home.</button>
                        </div>
                    </div>
                </div>
            `},
            { id: 5, title: "Sequential Lab", content: `
                <h2 class="title-massive text-3xl text-emerald-500 mb-2 text-center">Sequential Lab</h2>
                <p class="text-center text-gray-500 text-sm mb-8">Clear 10 cards to unlock the next chapter.</p>
                
                <div class="relative w-full h-[400px] md:h-[350px]">
                    ${[
                        {q: "3. I ___ swim very well.", o: ["can", "should"], a: 0},
                        {q: "4. You ___ smoke here. It's prohibited.", o: ["shouldn't", "can't"], a: 1},
                        {q: "5. I ___ like a cup of coffee, please.", o: ["can", "would"], a: 1},
                        {q: "6. You look sick. You ___ see a doctor.", o: ["should", "can"], a: 0},
                        {q: "7. ___ I use your phone?", o: ["Would", "Can"], a: 1},
                        {q: "8. We ___ to travel to London next year.", o: ["would like", "can"], a: 0},
                        {q: "9. You ___ eat too much sugar.", o: ["shouldn't", "can"], a: 0},
                        {q: "10. He ___ speak 5 languages.", o: ["should", "can"], a: 1},
                        {q: "11. What ___ I wear to the party?", o: ["should", "would like"], a: 0},
                        {q: "12. I ___ play the piano, but not the violin.", o: ["can", "should"], a: 0}
                    ].map((item, idx) => `
                        <div id="card-${idx}" class="sequential-card ${idx === 0 ? 'flex' : 'hidden'} card-enter glass-card p-8 rounded-3xl flex-col items-center justify-center gap-6 text-center absolute inset-0 w-full h-full border border-emerald-500/20 shadow-2xl overflow-hidden">
                            <span class="bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-full text-xs font-black">CHALLENGE ${idx + 3}</span>
                            <p class="text-2xl md:text-3xl text-white font-bold">${item.q}</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                                <button onclick="checkSequential(this, ${item.a === 0}, ${idx})" class="py-4 bg-[#050505] border-2 border-gray-800 rounded-2xl text-xl font-bold hover:border-emerald-500 transition">${item.o[0]}</button>
                                <button onclick="checkSequential(this, ${item.a === 1}, ${idx})" class="py-4 bg-[#050505] border-2 border-gray-800 rounded-2xl text-xl font-bold hover:border-emerald-500 transition">${item.o[1]}</button>
                            </div>
                            <div id="success-overlay-${idx}" class="hidden absolute inset-0 feedback-overlay z-20 flex flex-col items-center justify-center gap-4 animate-fadeIn">
                                <i class="fa-solid fa-circle-check text-6xl"></i>
                                <p class="text-3xl title-massive">CORRECT!</p>
                                <button onclick="proceedToNextCard(${idx})" class="px-8 py-3 bg-black text-emerald-400 rounded-full font-black text-lg shadow-xl uppercase italic">Keep Going <i class="fa-solid fa-arrow-right ml-2"></i></button>
                            </div>
                        </div>
                    `).join('')}
                    
                    <div id="lab-complete" class="hidden glass-card p-10 rounded-3xl flex-col items-center justify-center gap-6 text-center absolute inset-0 w-full h-full bg-emerald-900/10 border-2 border-emerald-500">
                        <i class="fa-solid fa-circle-check text-7xl text-emerald-500 animate-bounce"></i>
                        <h3 class="title-massive text-3xl text-white">Lab Synchronized</h3>
                        <p class="text-emerald-400 font-bold uppercase tracking-widest">10/10 Challenges Cleared</p>
                        <p class="text-white text-xs mt-4">The "Confirm & Proceed" button is now unlocked below.</p>
                    </div>
                </div>
            `},
            { id: 6, title: "Production Check", content: `
                <h2 class="title-massive text-3xl text-emerald-500 mb-8 text-center md:text-left">Final Check</h2>
                <div class="space-y-6">
                    <div id="prod-q-13" class="glass-card p-6 rounded-2xl border-l-4 border-emerald-500 relative overflow-hidden">
                        <p class="text-emerald-500 font-bold uppercase tracking-widest text-[10px] mb-2">Challenge 13</p>
                        <p class="text-white font-bold mb-4">Complete your desire: "I would like ____ a new house."</p>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="checkAnswer(this, true, 'prod-q-13')" class="py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl hover:border-emerald-500 transition">to buy</button>
                            <button onclick="checkAnswer(this, false, 'prod-q-13')" class="py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl hover:border-emerald-500 transition">buy</button>
                        </div>
                    </div>
                    <div id="prod-q-14" class="glass-card p-6 rounded-2xl border-l-4 border-blue-500 relative overflow-hidden">
                        <p class="text-blue-500 font-bold uppercase tracking-widest text-[10px] mb-2">Challenge 14</p>
                        <p class="text-white font-bold mb-4">Check the ability: "I ____ speak English very well now!"</p>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="checkAnswer(this, false, 'prod-q-14')" class="py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl hover:border-blue-500 transition">can to</button>
                            <button onclick="checkAnswer(this, true, 'prod-q-14')" class="py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl hover:border-blue-500 transition">can</button>
                        </div>
                    </div>
                    <div id="prod-q-15" class="glass-card p-6 rounded-2xl border-l-4 border-purple-500 relative overflow-hidden">
                        <p class="text-purple-500 font-bold uppercase tracking-widest text-[10px] mb-2">Challenge 15</p>
                        <p class="text-white font-bold mb-4">The advice: "You ____ drink water to be healthy."</p>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="checkAnswer(this, true, 'prod-q-15')" class="py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl hover:border-purple-500 transition">should</button>
                            <button onclick="checkAnswer(this, false, 'prod-q-15')" class="py-3 bg-[#0a0a0a] border border-gray-800 rounded-xl hover:border-purple-500 transition">can to</button>
                        </div>
                    </div>
                </div>
            `},
            { id: 7, title: "Mission Accomplished", content: `
                <div class="flex flex-col items-center justify-center text-center h-full min-h-[50vh] mt-4">
                    <h1 class="title-massive text-5xl text-white mb-8">MISSION REPORT</h1>
                    
                    <div class="glass-card p-8 rounded-3xl w-full max-w-lg mx-auto border-t-4 border-emerald-500 mb-8 shadow-[0_0_50px_rgba(16,185,129,0.2)]">
                        <div class="result-ring mb-6">
                            <div class="text-center">
                                <span id="final-percent" class="block text-4xl font-black italic">0%</span>
                                <span class="text-[10px] uppercase text-gray-500 font-bold tracking-widest">Accuracy</span>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 text-left border-t border-white/5 pt-6">
                            <div>
                                <p class="text-[10px] uppercase text-gray-500 font-bold">Total Correct</p>
                                <p id="final-score-txt" class="text-2xl font-black italic text-emerald-500">0 / 15</p>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase text-gray-500 font-bold">Badge Earned</p>
                                <p id="final-badge" class="text-2xl font-black italic text-white">RECRUIT</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-emerald-900/20 border border-emerald-500/40 p-6 rounded-2xl max-w-md w-full mb-8">
                        <p class="text-white font-bold mb-2"><i class="fa-solid fa-camera-retro mr-2"></i> ACTION REQUIRED:</p>
                        <p class="text-gray-300 text-sm italic text-center">Please take a screenshot of this REPORT and send it to your teacher along with any questions!</p>
                    </div>

                    <div class="flex gap-4 w-full max-w-md">
                        <button onclick="prevStep()" class="flex-1 py-4 bg-gray-800 text-white font-black uppercase italic rounded-full text-sm">BACK</button>
                        <button onclick="window.location.reload()" class="flex-[2] py-4 bg-emerald-500 text-black font-black uppercase italic rounded-full shadow-[0_0_40px_rgba(16,185,129,0.4)]">RESTART MISSION</button>
                    </div>
                </div>
            `}
        ];

        let currentStep = 0;
        const wrapper = document.getElementById('steps-wrapper');

        function init() {
            homeworkSteps.forEach((step, index) => {
                const div = document.createElement('div');
                div.className = `step-container`;
                div.id = `step-${index}`;
                
                let navButtons = '';
                if (index < homeworkSteps.length - 1) {
                    const isSequentialLab = index === 4;
                    navButtons = `
                    <div id="nav-container-${index}" class="mt-12 flex flex-col md:flex-row justify-center gap-4 px-4 ${isSequentialLab ? 'hidden' : 'flex'}">
                        ${index > 0 ? `<button onclick="prevStep()" class="nav-btn w-full max-w-[180px] py-4 bg-gray-800 text-white rounded-full title-massive text-lg flex items-center justify-center gap-2 order-2 md:order-1"><i class="fa-solid fa-arrow-left"></i> BACK</button>` : ''}
                        <button id="next-btn-${index}" onclick="nextStep()" class="nav-btn w-full max-w-md py-5 bg-emerald-500 text-black rounded-full title-massive text-xl flex items-center justify-center gap-4 order-1 md:order-2">CONFIRM & PROCEED <i class="fa-solid fa-arrow-right"></i></button>
                    </div>`;
                }
                
                div.innerHTML = `<div class="max-w-3xl mx-auto">${step.content}${navButtons}</div>`;
                wrapper.appendChild(div);
            });
            update();
        }

        function update() {
            document.querySelectorAll('.step-container').forEach((el, i) => {
                el.classList.toggle('active', i === currentStep);
            });
            document.getElementById('step-counter').innerText = currentStep + 1;
            document.getElementById('progress-bar').style.width = `${((currentStep + 1) / homeworkSteps.length) * 100}%`;
            
            if (currentStep === homeworkSteps.length - 1) {
                renderFinalResults();
            }

            wrapper.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderFinalResults() {
            const finalScoreTxt = document.getElementById('final-score-txt');
            const finalPercent = document.getElementById('final-percent');
            const finalBadge = document.getElementById('final-badge');

            const percentage = Math.round((score / totalPossibleQuestions) * 100);
            
            finalScoreTxt.innerText = `${score} / ${totalPossibleQuestions}`;
            finalPercent.innerText = `${percentage}%`;

            if (percentage === 100) finalBadge.innerText = "GOD MODE";
            else if (percentage >= 80) finalBadge.innerText = "MASTER";
            else if (percentage >= 50) finalBadge.innerText = "AGENT";
            else finalBadge.innerText = "RECRUIT";
        }

        function nextStep() {
            if (currentStep < homeworkSteps.length - 1) {
                currentStep++;
                update();
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                update();
            }
        }

        function checkAnswer(btn, isCorrect, containerId) {
            const container = document.getElementById(containerId);
            btn.classList.remove('shake', 'correct');
            void btn.offsetWidth;
            
            if (isCorrect) {
                if (!answeredQuestions.has(containerId)) {
                    score++;
                    answeredQuestions.add(containerId);
                }

                btn.classList.add('correct');
                if(!container.querySelector('.success-label')) {
                    const label = document.createElement('div');
                    label.className = 'success-label absolute top-2 right-4 text-emerald-500 font-black italic uppercase text-[10px] animate-bounce';
                    label.innerHTML = '<i class="fa-solid fa-circle-check"></i> Great Job!';
                    container.appendChild(label);
                }
            } else {
                btn.classList.add('shake');
                setTimeout(() => btn.classList.remove('shake'), 400);
            }
        }

        function checkSequential(btn, isCorrect, idx) {
            btn.classList.remove('shake', 'correct');
            void btn.offsetWidth;
            if (isCorrect) {
                const questionId = `sequential-q-${idx}`;
                if (!answeredQuestions.has(questionId)) {
                    score++;
                    answeredQuestions.add(questionId);
                }

                btn.classList.add('correct');
                const overlay = document.getElementById(`success-overlay-${idx}`);
                overlay.classList.remove('hidden');
                overlay.classList.add('flex');
            } else {
                btn.classList.add('shake');
                setTimeout(() => btn.classList.remove('shake'), 400);
            }
        }

        function proceedToNextCard(idx) {
            document.getElementById(`card-${idx}`).classList.add('hidden');
            document.getElementById(`card-${idx}`).classList.remove('flex');
            if (idx < 9) {
                const next = document.getElementById(`card-${idx + 1}`);
                next.classList.remove('hidden');
                next.classList.add('flex');
            } else {
                labFinished = true;
                document.getElementById('lab-complete').classList.remove('hidden');
                document.getElementById('lab-complete').classList.add('flex');
                // Mostra o botão de navegação apenas quando o Lab termina
                document.getElementById('nav-container-4').classList.remove('hidden');
                document.getElementById('nav-container-4').classList.add('flex');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
